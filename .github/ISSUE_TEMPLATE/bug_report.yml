name: Bug report
description: Report a reproducible problem with the GRF estimation code.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this project. Please do not report security vulnerabilities, private participant data, or credentials here; use the security policy instead.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Model architecture
        - LOSO training
        - Data preprocessing
        - Clinical metrics
        - XAI pipeline
        - Visualization
        - Documentation
        - Packaging or installation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest example that shows the problem. Redact private participant data.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions when possible.
      value: |
        - OS:
        - Python:
        - PyTorch:
        - CUDA:
        - Repository commit:
        - Dataset version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      description: Paste traceback, command output, or notebook cell output. Redact secrets and participant information.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for similar reports.
          required: true
        - label: This is not a security vulnerability and does not include private participant data.
          required: true
